## ===============================
## REQUEST SIZE - за base64 снимки в JSON body
## ===============================
# Tomcat default е 2MB - увеличаваме за create с imageUrl base64
server.tomcat.max-http-form-post-size=20MB

## ===============================
## FILE UPLOAD SETTINGS
## ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# КРИТИЧНО: Задаваме file-size-threshold на 0, за да държим файловете в паметта
# Това е необходимо за Render.com, където файловата система е ефемерна
spring.servlet.multipart.file-size-threshold=0

## ===============================
## DATABASE (PostgreSQL)
## ===============================
# Локално: стартирай PostgreSQL (напр. docker compose up -d postgres в root на репото).
# Променливи: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
# Или цял JDBC URL: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:webshop}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:webshop}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:webshop}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.flush_mode=commit
spring.jpa.properties.hibernate.jdbc.batch_size=0

# Транзакции - Spring управлява автоматично с @Transactional
spring.transaction.default-timeout=60

# Качени снимки: ./data/item-uploads/ (виж UploadStorage) — в БД остава само кратък маркер fs:...

## ===============================
## ENCODING (CYRILLIC)
## ===============================
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

## ===============================
## ACTUATOR (health endpoint)
## ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

## ===============================
## LOGGING
## ===============================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.http.converter=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.webshop=DEBUG

## ===============================
## JWT (stateless автентикация)
## ===============================
# HS256 изисква ключ ≥ 32 байта. В production задайте JWT_SECRET в environment.
jwt.secret=${JWT_SECRET:webshop-local-dev-jwt-secret-min-32-chars!}
# Валидност на токена в ms (по подразбиране 10 часа)
jwt.expiration-ms=36000000

## ===============================
## STRIPE PAYMENT CONFIGURATION
## ===============================
# Stripe Secret Key - задава се като environment variable STRIPE_SECRET_KEY
# За тестване използвайте test key от Stripe Dashboard
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_51QJxXxExampleReplaceWithYourKey}
