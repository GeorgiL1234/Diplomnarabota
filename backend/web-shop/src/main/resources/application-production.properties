## ===============================
## PRODUCTION CONFIGURATION
## ===============================
## Активира се с: spring.profiles.active=production
## Задайте PostgreSQL през environment (Render/Railway/VPS):
##   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
## или DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD

## ===============================
## SERVER
## ===============================
server.port=${PORT:8080}

## ===============================
## DATABASE (PostgreSQL)
## ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:webshop}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:webshop}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:webshop}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

## ===============================
## JWT – задължително задайте JWT_SECRET в environment, ≥ 32 символа
## ===============================
jwt.secret=${JWT_SECRET:webshop-render-fallback-secret-min-32b!!}
jwt.expiration-ms=36000000

## ===============================
## REQUEST / UPLOAD
## ===============================
server.tomcat.max-http-form-post-size=20MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.file-size-threshold=0

## ===============================
## ENCODING (CYRILLIC)
## ===============================
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

## ===============================
## LOGGING
## ===============================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.http.converter=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.example.webshop=INFO
