## ===============================
## PRODUCTION CONFIGURATION (PostgreSQL)
## ===============================
## Активира се с: spring.profiles.active=production
## (docker-compose.yml задава този профил за услугата web-shop.)
##
## НЕ активирайте production на Render, освен ако имате реален PostgreSQL
## (напр. Render PostgreSQL + SPRING_DATASOURCE_URL / DB_* променливи).
## Без БД → приложението няма да стартира. За Render без Postgres оставете
## подразбирането в application.properties (H2).
##
## PostgreSQL през environment:
##   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
## или DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD

## ===============================
## SERVER
## ===============================
server.port=${PORT:8080}

## ===============================
## DATABASE (PostgreSQL when configured, otherwise H2 fallback)
## ===============================
# Ако няма зададен SPRING_DATASOURCE_URL, ползваме H2 и приложението стартира и без външна БД.
# Ако има PostgreSQL URL, Spring Boot auto-detect-ва драйвера от classpath.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/webshopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Оставяме Hibernate да избере диалект автоматично според datasource-а.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

## ===============================
## JWT – задължително задайте JWT_SECRET в environment, ≥ 32 символа
## ===============================
jwt.secret=${JWT_SECRET:webshop-render-fallback-secret-min-32b!!}
jwt.expiration-ms=36000000

## ===============================
## REQUEST / UPLOAD
## ===============================
server.tomcat.max-http-form-post-size=20MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.file-size-threshold=0

## ===============================
## ENCODING (CYRILLIC)
## ===============================
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

## ===============================
## LOGGING
## ===============================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.http.converter=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.example.webshop=INFO
