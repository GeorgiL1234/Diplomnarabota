services:
  # Backend Service
  - type: web
    name: webshop-backend
    env: java
    buildCommand: cd backend/web-shop && ./mvnw clean package -DskipTests
    startCommand: cd backend/web-shop && java -jar target/web-shop-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DB_HOST
        fromDatabase:
          name: webshop-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: webshop-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: webshop-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: webshop-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: webshop-db
          property: password
      - key: JAVA_VERSION
        value: 17

  # Frontend Service
  - type: web
    name: webshop-frontend
    env: static
    buildCommand: cd web-shop-frontend && npm install && npm run build
    staticPublishPath: web-shop-frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: webshop-backend
          property: host

databases:
  - name: webshop-db
    databaseName: webshop
    user: webshop
